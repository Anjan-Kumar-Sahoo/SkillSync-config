# ============================================================
#  SkillSync - Shared Configuration (Config Server - GitHub)
#  Applied to ALL microservices via Spring Cloud Config
#
#  ⚠️  All values MUST use ${ENV_VAR:default} pattern
#       to support both LOCAL and DOCKER execution.
# ============================================================

# ======================== EUREKA ==============================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ======================== DATABASE ============================
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======================== JWT =================================
jwt.secret=${JWT_SECRET:c2tpbGxzeW5jLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# ======================== ACTUATOR ============================
management.endpoints.web.exposure.include=health,info
logging.level.com.skillsync=DEBUG
